services:
  twin-alpha:
    build: .
    container_name: twin-alpha
    environment:
      - PORT=4000
      - NODE_ID=alpha
      - NODE_NAME=Node Alpha
      - PEER_URL=ws://twin-beta:4000
    ports:
      - "4000:4000"

  twin-beta:
    build: .
    container_name: twin-beta
    environment:
      - PORT=4000
      - NODE_ID=beta
      - NODE_NAME=Node Beta
      - PEER_URL=ws://twin-alpha:4000
    ports:
      - "4001:4000"

  twin-proxy:
    build: .
    container_name: twin-proxy
    command: ["node", "server/proxy.js"]
    environment:
      - PROXY_PORT=4002
      - ALPHA_HOST=twin-alpha
      - ALPHA_PORT=4000
      - BETA_HOST=twin-beta
      - BETA_PORT=4000
    ports:
      - "4002:4002"
    depends_on:
      - twin-alpha
      - twin-beta
